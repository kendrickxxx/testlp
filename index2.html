<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Link Landing Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #24282b;
      color: #ffffff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
      text-align: center;
    }

    .verified-badge-wrap {
      display: flex;
      justify-content: center;
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: lowercase;
      background: rgba(255,255,255,0.04);
      color: #ffffff;
    }

    .verified-dot,
    .mini-verified {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1d9bf0;
    }

    .verified-dot {
      width: 14px;
      height: 14px;
    }

    .verified-dot svg,
    .mini-verified svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .divider-line {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.85);
      margin: 0 auto 12px;
    }

    .top-symbol {
      font-size: 22px;
      line-height: 1;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .profile-name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .mini-verified {
      width:
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
    }

    .top-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      background: #e60f64;
      color: #ffffff;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 18px;
      padding: 12px 20px;
    }

    .more-button {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      background: #e9e9e9;
      color: #111111;
      border-radius: 999px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .more-text {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      padding-right: 40px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .video-card {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 24px;
      overflow: hidden;
      background: #111111;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .video-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000000;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(0,0,0,0.35), rgba(0,0,0,0.05));
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .video-card.playing .play-overlay {
      opacity: 0;
    }

    .play-button {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .play-button svg {
      width: 22px;
      height: 22px;
      margin-left: 3px;
      fill: #111111;
    }

    @media (max-width: 380px) {
      .page {
        padding: 12px;
      }

      .video-grid {
        gap: 10px;
      }

      .top-button {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="verified-badge-wrap">
      <span class="verified-badge">
        <span class="verified-dot">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M9.55 16.2 5.8 12.45l1.4-1.4 2.35 2.35 7.25-7.25 1.4 1.4z" fill="currentColor"/>
          </svg>
        </span>
        verified page
      </span>
    </div>

    <div class="divider-line"></div>
    <div class="top-symbol">∞</div>

    <div class="profile-name-row">
      <span class="mini-verified">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2.5 14.28 4l2.66-.28 1.5 2.28L21 7.5l-.28 2.66L22.5 12l-1.78 1.84L21 16.5l-2.56 1.5-1.5 2.28-2.66-.28L12 21.5 9.72 20l-2.66.28-1.5-2.28L3 16.5l.28-2.66L1.5 12l1.78-1.84L3 7.5 5.56 6l1.5-2.28L9.72 4 12 2.5Z" fill="currentColor"/>
          <path d="M10.55 14.8 7.9 12.15l1.06-1.06 1.59 1.59 4.49-4.49 1.06 1.06-5.55 5.55Z" fill="white"/>
        </svg>
      </span>
      <span class="profile-name">Ginger4play</span>
    </div>

    <div class="profile-photo-wrap">
      <img
        class="profile-photo"
        src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=600&q=80"
        alt="Profile Photo"
      />
    </div>

    <div class="visitor-meta">
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>Online</span>
      </div>
      <div class="location-pill">
        <span class="pin-icon">📍</span>
        <span id="visitor-location">Detecting location...</span>
      </div>
    </div>

    <a href="#" class="top-button">Click Here</a>

    <a href="#" class="more-button">
      <span class="icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="5" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke="white" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
        </svg>
      </span>
      <span class="more-text">More Videos</span>
    </a>

    <div class="video-grid">
      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e23/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e23/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e23/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e23/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e23/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cards = document.querySelectorAll('.video-card');
    const locationText = document.getElementById('visitor-location');

    cards.forEach((card) => {
      const video = card.querySelector('video');

      card.addEventListener('click', () => {
        cards.forEach((otherCard) => {
          const otherVideo = otherCard.querySelector('video');
          if (otherVideo !== video) {
            otherVideo.pause();
            otherCard.classList.remove('playing');
          }
        });

        if (video.paused) {
          video.play();
          card.classList.add('playing');
        } else {
          video.pause();
          card.classList.remove('playing');
        }
      });

      video.addEventListener('ended', () => {
        card.classList.remove('playing');
      });

      video.addEventListener('pause', () => {
        card.classList.remove('playing');
      });

      video.addEventListener('play', () => {
        card.classList.add('playing');
      });
    });

    async function loadVisitorLocation() {
      try {
        const response = await fetch('https://ipwho.is/');
        const data = await response.json();

        if (data && data.success) {
          const city = data.city || '';
          const region = data.region || data.country || '';
          const location = [city, region].filter(Boolean).join(', ');
          locationText.textContent = location || 'Nearby area';
        } else {
          locationText.textContent = 'Nearby area';
        }
      } catch (error) {
        locationText.textContent = 'Nearby area';
      }
    }

    loadVisitorLocation();
  </script>
</body>
</html>
