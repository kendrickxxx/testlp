    body {

    .page {

    }

    .popup-text {

      color: #666;

    }

    .popup-btn {
      width: 100%;
      background: #000;
      color: #fff;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* VERIFIED BADGE */
    .verified-badge-wrap { display:flex; justify-content:center; margin-bottom:18px; }
    .verified-badge {
      background: #2196f3;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: #ffffff;
      border: 2px solid rgba(255,255,255,0.95);

    .divider-line { height:1px; background:#fff; margin-bottom:12px; }
    .top-symbol { text-align:center; margin-bottom:14px; }

    .profile-name-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .profile-name {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
      color: #ffffff;
    }

    .mini-verified {
      width: 28px;
      height: 28px;
      color: #2196f3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 28px;
    }

    .mini-verified svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .profile-photo-wrap { display:flex; justify-content:center; margin-bottom:14px; }
    .profile-photo {
      width:100px; height:100px;
      border-radius:50%;
      object-fit:cover;
    }

    .visitor-meta { display:flex; justify-content:center; gap:10px; margin-bottom:16px; }

    .pill {
      background:#eee;
      color:#222;
      padding:8px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .dot { width:10px; height:10px; background:#22c55e; border-radius:50%; }

    /* DESCRIPTION */
    .desc {
      background:#000;
      padding:12px;
      border-radius:10px;
      font-size:14px;
      text-align:center;
      margin-bottom:16px;
    }

    .top-button {
      width:100%;
      background:#f21767;
      padding:14px;
      border-radius:999px;
      text-align:center;
      font-weight:700;
      margin-bottom:14px;
    }

    .more-button {
      display:flex;
      align-items:center;
      background:#eee;
      border-radius:999px;
      padding:10px;
      margin-bottom:18px;
    }

    .icon-wrap {
      width:36px; height:36px; background:#000; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin-right:10px;
    }

    .more-text {
      flex: 1;
      text-align: center;
      color: #111111;
      font-size: 14px;
      font-weight: 500;
      padding-right: 46px;
    }

    .video-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .video-card {
      position:relative;
      aspect-ratio:9/16;
      border-radius:16px;
      overflow:hidden;
      background:#000;
    }

    video { width:100%; height:100%; object-fit:cover; }

    .play-overlay {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
    }

    .play-button {
      width: 52px;
      height: 52px;

      font-size: 22px;

      flex: 0 0 52px;

<script>
function acceptContent(){
  document.getElementById('popup').style.display='none';
  document.getElementById('main').style.display='block';
  localStorage.setItem('accepted','1');
}

if(localStorage.getItem('accepted')){
  acceptContent();
}

async function loadLocation(){
  const pill = document.getElementById('location-pill');
  const text = document.getElementById('loc');

  function formatLocation(city, region, country){
    const clean = [city, region, country]
      .map(v => (typeof v === 'string' ? v.trim() : ''))
      .filter(v => v && v.toLowerCase() !== 'undefined' && v.toLowerCase() !== 'null');

    if (clean.length >= 2) return clean.slice(0, 2).join(', ');
    if (clean.length === 1) return clean[0];
    return '';
  }

  async function tryIpApi(){
    const res = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
    if (!res.ok) throw new Error('ipapi failed');
    const d = await res.json();
    return formatLocation(d.city, d.region, d.country_name);
  }

  async function tryIpWho(){
    const res = await fetch('https://ipwho.is/', { cache: 'no-store' });
    if (!res.ok) throw new Error('ipwho failed');
    const d = await res.json();
    if (!d || d.success === false) throw new Error('ipwho invalid');
    return formatLocation(d.city, d.region, d.country);
  }

  async function tryIpInfo(){
    const res = await fetch('https://ipinfo.io/json', { cache: 'no-store' });
    if (!res.ok) throw new Error('ipinfo failed');
    const d = await res.json();
    return formatLocation(d.city, d.region, d.country);
  }

  const providers = [tryIpApi, tryIpWho, tryIpInfo];

  for (const provider of providers) {
    try {
      const loc = await provider();
      if (loc) {
        text.textContent = loc;
        pill.hidden = false;
        return;
      }
    } catch (e) {}
  }

  pill.hidden = true;
}

loadLocation();

// video play logic
const cards = document.querySelectorAll('.video-card');
const videos = document.querySelectorAll('.video-card video');

cards.forEach((card) => {
  const video = card.querySelector('video');
  const overlay = card.querySelector('.play-overlay');

  card.addEventListener('click', () => {
    videos.forEach((other) => {
      if (other !== video) other.pause();
    });

    if (video.paused) {
      video.play();
      if (overlay) overlay.style.opacity = '0';
    } else {
      video.pause();
      if (overlay) overlay.style.opacity = '1';
    }
  });

  video.addEventListener('pause', () => {
    if (overlay) overlay.style.opacity = '1';
  });

  video.addEventListener('ended', () => {
    if (overlay) overlay.style.opacity = '1';
  });

  video.addEventListener('play', () => {
    if (overlay) overlay.style.opacity = '0';
  });
});
</script>
