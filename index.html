<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Player Generator</title>

  <!-- =========================
       IKLAN 1: HEAD / GLOBAL ADS SCRIPT
       Ganti blok ini dengan script iklan kamu sendiri
       ========================= -->
  <!--
  <script async src="https://iklan-kamu.com/script.js"></script>
  -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dashjs/dist/dash.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flv.js/dist/flv.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js/dist/mpegts.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #020617;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --border: #334155;
      --primary: #2563eb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .hidden {
      display: none !important;
    }

    .ad-slot {
      width: 100%;
      max-width: 728px;
      min-height: 90px;
      margin: 16px auto;
      border: 2px dashed var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 12px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.02);
    }

    .quality-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
    }

    /* PLAYER AREA */
    .artplayer-app {
      width: 100%;
      height: min(72vh, 900px);
      min-height: 280px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    .art-video-player {
      background: #000 !important;
    }

    .art-video-player video {
      object-fit: contain !important;
      background: #000 !important;
    }

    @media (max-width: 768px) {
      .artplayer-app {
        height: 70vh;
        min-height: 260px;
        aspect-ratio: auto !important;
      }

      .quality-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- GENERATOR -->
    <div id="generator" class="card-box">
      <h3 class="mb-3">🎬 Video Player Generator</h3>

      <div class="mb-3">
        <label class="form-label">Base URL</label>
        <input id="baseUrl" class="form-control" readonly />
      </div>

      <div class="mb-3">
        <label class="form-label">Format Video</label>
        <select id="playType" class="form-select">
          <option value="mp4">MP4</option>
          <option value="hls">HLS (.m3u8)</option>
          <option value="dash">DASH (.mpd)</option>
          <option value="flv">FLV (.flv)</option>
          <option value="mpegts">MPEG-TS (.ts)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label d-block">Mode Source</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="sourceMode" id="modeSingle" value="single" checked />
          <label class="form-check-label" for="modeSingle">Single</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="sourceMode" id="modeMulti" value="multi" />
          <label class="form-check-label" for="modeMulti">Multi Video</label>
        </div>
      </div>

      <div id="singleInput" class="mb-3">
        <label class="form-label">Link Video</label>
        <input id="singleUrl" class="form-control" placeholder="https://cdn-kamu.com/video.m3u8" />
      </div>

      <div id="multiInput" class="hidden mb-3">
        <label class="form-label">Daftar Video / Source</label>
        <div id="qualityList"></div>
        <button id="addQualityBtn" class="btn btn-outline-light btn-sm" type="button">+ Tambah Video</button>
        <div class="note mt-2">
          Cukup isi URL video saja. Tidak perlu isi 720p / 1080p manual.
        </div>
      </div>

      <div class="d-grid gap-2">
        <button id="generateBtn" class="btn btn-primary" type="button">Generate Link</button>
      </div>

      <div id="resultArea" class="hidden mt-4">
        <label class="form-label">Hasil Link</label>
        <textarea id="finalUrl" class="form-control" readonly></textarea>
        <div class="d-flex gap-2 mt-2 flex-wrap">
          <button id="copyBtn" class="btn btn-success" type="button">Copy</button>
          <button id="openBtn" class="btn btn-warning" type="button">Buka Player</button>
        </div>
      </div>
    </div>

    <!-- PLAYER -->
    <div id="playerMode" class="hidden">
      <!-- =========================
           IKLAN 2: BANNER ATAS PLAYER
           Ganti isi div ini dengan kode iklan kamu
           ========================= -->
      <div class="ad-slot" id="adTop">
        SLOT IKLAN ATAS PLAYER
      </div>

      <div class="card-box">
        <div class="artplayer-app"></div>
      </div>

      <!-- =========================
           IKLAN 3: BANNER BAWAH PLAYER
           Ganti isi div ini dengan kode iklan kamu
           ========================= -->
      <div class="ad-slot" id="adBottom">
        SLOT IKLAN BAWAH PLAYER
      </div>
    </div>
  </div>

  <template id="qualityRowTemplate">
    <div class="quality-row">
      <input class="form-control q-url" placeholder="https://cdn-kamu.com/video.m3u8" />
      <div class="form-check d-flex align-items-center">
        <input class="form-check-input q-default" type="radio" name="q-default" />
        <label class="form-check-label ms-2">Default</label>
      </div>
      <button class="btn btn-danger btn-sm remove-row" type="button">Hapus</button>
    </div>
  </template>

  <script>
    function enc(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function dec(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    function qs(sel) {
      return document.querySelector(sel);
    }

    function qsa(sel) {
      return Array.from(document.querySelectorAll(sel));
    }

    function getBaseUrl() {
      return location.origin + location.pathname;
    }

    function getSelectedSourceMode() {
      return qs('input[name="sourceMode"]:checked').value;
    }

    function toggleInputs() {
      const mode = getSelectedSourceMode();
      qs('#singleInput').classList.toggle('hidden', mode !== 'single');
      qs('#multiInput').classList.toggle('hidden', mode !== 'multi');
    }

    function addQualityRow(url = '', checked = false) {
      const tpl = qs('#qualityRowTemplate');
      const node = tpl.content.cloneNode(true);
      const wrap = document.createElement('div');
      wrap.appendChild(node);

      const row = wrap.firstElementChild;
      row.querySelector('.q-url').value = url;
      row.querySelector('.q-default').checked = checked;

      row.querySelector('.remove-row').addEventListener('click', () => {
        row.remove();
      });

      qs('#qualityList').appendChild(row);
    }

    function generateLink() {
      const type = qs('#playType').value;
      const mode = getSelectedSourceMode();
      let payload = '';

      if (mode === 'single') {
        const singleUrl = qs('#singleUrl').value.trim();
        if (!singleUrl) {
          alert('Masukkan link video.');
          return;
        }
        payload = singleUrl;
      } else {
        const rows = qsa('#qualityList .quality-row');
        const list = [];

        rows.forEach((row, index) => {
          const url = row.querySelector('.q-url').value.trim();
          const isDefault = row.querySelector('.q-default').checked;

          if (url) {
            list.push({
              label: `Video ${index + 1}`,
              url,
              default: isDefault
            });
          }
        });

        if (list.length < 1) {
          alert('Minimal isi 1 video.');
          return;
        }

        if (!list.some(item => item.default)) {
          list[0].default = true;
        }

        payload = JSON.stringify(list);
      }

      const finalLink = `${getBaseUrl()}?t=${encodeURIComponent(type)}&f=${encodeURIComponent(enc(payload))}`;
      qs('#finalUrl').value = finalLink;
      qs('#resultArea').classList.remove('hidden');
    }

    function copyToClipboard() {
      navigator.clipboard.writeText(qs('#finalUrl').value)
        .then(() => alert('Link berhasil disalin.'))
        .catch(() => alert('Gagal copy link.'));
    }

    function openPlayer() {
      const url = qs('#finalUrl').value;
      if (!url) return;
      location.href = url;
    }

    function getArtType(type) {
      if (type === 'hls') return 'm3u8';
      if (type === 'dash') return 'mpd';
      if (type === 'flv') return 'flv';
      if (type === 'mpegts') return 'mpegts';
      return 'mp4';
    }

    function destroyCurrentEngines(art) {
      if (art._hls) {
        art._hls.destroy();
        art._hls = null;
      }

      if (art._dash) {
        art._dash.reset();
        art._dash = null;
      }

      if (art._flv) {
        art._flv.destroy();
        art._flv = null;
      }

      if (art._mpegts) {
        art._mpegts.destroy();
        art._mpegts = null;
      }
    }

    function applySourceByType(art, type, url) {
      destroyCurrentEngines(art);

      const video = art.template.$video;

      if (type === 'hls') {
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
          art._hls = hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
        } else {
          alert('Browser tidak mendukung HLS.');
        }
        return;
      }

      if (type === 'dash') {
        const dash = dashjs.MediaPlayer().create();
        dash.initialize(video, url, false);
        art._dash = dash;
        return;
      }

      if (type === 'flv') {
        if (flvjs.isSupported()) {
          const flv = flvjs.createPlayer({ type: 'flv', url });
          flv.attachMediaElement(video);
          flv.load();
          art._flv = flv;
        } else {
          alert('Browser tidak mendukung FLV.');
        }
        return;
      }

      if (type === 'mpegts') {
        if (window.mpegts) {
          const ts = mpegts.createPlayer({ type: 'mpegts', url });
          ts.attachMediaElement(video);
          ts.load();
          art._mpegts = ts;
        } else {
          alert('Browser tidak mendukung MPEGTS.');
        }
        return;
      }

      video.src = url;
    }

    function updateResolutionLabels(art, sourceList, activeUrl) {
      const video = art.template.$video;
      const w = video.videoWidth;
      const h = video.videoHeight;

      if (!w || !h || !sourceList?.length) return;

      const activeIndex = sourceList.findIndex(item => item.url === activeUrl);
      if (activeIndex === -1) return;

      sourceList[activeIndex].label = `${w}x${h}`;
      buildSourceSetting(art, sourceList, activeUrl);
    }

    function buildSourceSetting(art, sourceList, activeUrl) {
      if (!sourceList || sourceList.length <= 1) return;

      const settingItems = sourceList.map(item => ({
        html: item.label,
        tooltip: item.url === activeUrl ? 'Aktif' : '',
        switch: item.url === activeUrl,
        click: () => {
          applySourceByType(art, art._sourceType, item.url);
          art.notice.show = `Berpindah ke ${item.label}`;

          setTimeout(() => {
            try {
              art.play();
            } catch (e) {}
          }, 200);

          buildSourceSetting(art, sourceList, item.url);

          const video = art.template.$video;
          video.onloadedmetadata = () => {
            updateResolutionLabels(art, sourceList, item.url);
          };
        }
      }));

      art.setting.update({
        name: 'source-switcher',
        html: 'Video',
        tooltip: sourceList.find(item => item.url === activeUrl)?.label || 'Pilih',
        selector: settingItems
      });
    }

    function setupPlayer() {
      const params = new URLSearchParams(location.search);
      const type = params.get('t');
      const f = params.get('f');

      if (!type || !f) {
        return;
      }

      qs('#generator').classList.add('hidden');
      qs('#playerMode').classList.remove('hidden');

      let decodedPayload;
      try {
        decodedPayload = dec(decodeURIComponent(f));
      } catch (err) {
        alert('Payload video tidak valid.');
        return;
      }

      let sourceList = [];
      let finalSource = '';

      try {
        const parsed = JSON.parse(decodedPayload);
        if (Array.isArray(parsed)) {
          sourceList = parsed;
          finalSource = parsed.find(x => x.default)?.url || parsed[0]?.url || '';
        } else {
          finalSource = decodedPayload;
        }
      } catch (err) {
        finalSource = decodedPayload;
      }

      if (!finalSource) {
        alert('Source video tidak ditemukan.');
        return;
      }

      const option = {
        container: '.artplayer-app',
        url: finalSource,
        type: getArtType(type),
        autoplay: false,
        fullscreen: true,
        fullscreenWeb: true,
        autoSize: false,
        setting: true,
        pip: true,
        mutex: true,
        customType: {},
        contextmenu: [
          {
            html: 'Reload',
            click: () => location.reload()
          }
        ]
      };

      if (type === 'hls') {
        option.customType.m3u8 = function(video, url) {
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
          } else {
            alert('Browser tidak mendukung HLS.');
          }
        };
      }

      if (type === 'dash') {
        option.customType.mpd = function(video, url) {
          dashjs.MediaPlayer().create().initialize(video, url, false);
        };
      }

      if (type === 'flv') {
        option.customType.flv = function(video, url) {
          if (flvjs.isSupported()) {
            const player = flvjs.createPlayer({ type: 'flv', url });
            player.attachMediaElement(video);
            player.load();
          } else {
            alert('Browser tidak mendukung FLV.');
          }
        };
      }

      if (type === 'mpegts') {
        option.customType.mpegts = function(video, url) {
          if (window.mpegts) {
            const player = mpegts.createPlayer({ type: 'mpegts', url });
            player.attachMediaElement(video);
            player.load();
          } else {
            alert('Browser tidak mendukung MPEGTS.');
          }
        };
      }

      const art = new Artplayer(option);
      art._sourceType = type;

      art.on('ready', () => {
        const video = art.template.$video;

        if (sourceList.length > 1) {
          buildSourceSetting(art, sourceList, finalSource);
        }

        video.onloadedmetadata = () => {
          updateResolutionLabels(art, sourceList, finalSource);
        };
      });

      /* =========================
         IKLAN 4: HOOK IKLAN SAAT PLAY
         Tempat paling aman untuk trigger popup/ad script
         Ganti isi di bawah dengan punyamu sendiri
         ========================= */
      let adTriggered = false;
      art.on('play', () => {
        if (adTriggered) return;
        adTriggered = true;

        // contoh:
        // triggerAdPopup();
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      qs('#baseUrl').value = getBaseUrl();

      qsa('input[name="sourceMode"]').forEach(el => {
        el.addEventListener('change', toggleInputs);
      });

      qs('#addQualityBtn').addEventListener('click', () => addQualityRow());
      qs('#generateBtn').addEventListener('click', generateLink);
      qs('#copyBtn').addEventListener('click', copyToClipboard);
      qs('#openBtn').addEventListener('click', openPlayer);

      toggleInputs();
      setupPlayer();
    });
  </script>
</body>
</html>
