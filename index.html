<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Link Landing Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #24282b;
      color: #ffffff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
    }

    .top-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      background: #e60f64;
      color: #ffffff;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 18px;
      padding: 12px 20px;
    }

    .more-button {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      background: #e9e9e9;
      color: #111111;
      border-radius: 999px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .more-text {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      padding-right: 40px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .video-card {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 24px;
      overflow: hidden;
      background: #111111;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .video-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000000;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(0,0,0,0.35), rgba(0,0,0,0.05));
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .video-card.playing .play-overlay {
      opacity: 0;
    }

    .play-button {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .play-button svg {
      width: 22px;
      height: 22px;
      margin-left: 3px;
      fill: #111111;
    }

    @media (max-width: 380px) {
      .page {
        padding: 12px;
      }

      .video-grid {
        gap: 10px;
      }

      .top-button {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="#" class="top-button">Click Here</a>

    <a href="#" class="more-button">
      <span class="icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="5" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke="white" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
        </svg>
      </span>
      <span class="more-text">More Videos</span>
    </a>

    <div class="video-grid">
      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e2/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e2/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e2/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e2/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="video-card">
        <video playsinline preload="metadata" src="https://media.icfcdn.com/01ce20/56/114276707/608951f03342478d87809576c8f96e2/media.mp4"></video>
        <div class="play-overlay">
          <div class="play-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5.14v13.72c0 .8.87 1.3 1.57.9l10.29-5.86a1.03 1.03 0 0 0 0-1.8L9.57 4.24A1.03 1.03 0 0 0 8 5.14z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cards = document.querySelectorAll('.video-card');

    cards.forEach((card) => {
      const video = card.querySelector('video');

      card.addEventListener('click', () => {
        cards.forEach((otherCard) => {
          const otherVideo = otherCard.querySelector('video');
          if (otherVideo !== video) {
            otherVideo.pause();
            otherCard.classList.remove('playing');
          }
        });

        if (video.paused) {
          video.play();
          card.classList.add('playing');
        } else {
          video.pause();
          card.classList.remove('playing');
        }
      });

      video.addEventListener('ended', () => {
        card.classList.remove('playing');
      });

      video.addEventListener('pause', () => {
        card.classList.remove('playing');
      });

      video.addEventListener('play', () => {
        card.classList.add('playing');
      });
    });
  </script>
</body>
</html>
