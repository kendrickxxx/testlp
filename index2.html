<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Link Landing Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(90deg, #2b3137 0%, #1f252b 50%, #2b3137 100%);
      color: #ffffff;
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 28px;
    }

    .verified-badge-wrap {
      display: flex;
      justify-content: center;
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      line-height: 1;
      text-transform: lowercase;
    }

    .verified-dot {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1d9bf0;
      flex: 0 0 14px;
    }

    .verified-dot svg,
    .mini-verified svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .divider-line {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.85);
      margin-bottom: 12px;
    }

    .top-symbol {
      text-align: center;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 14px;
      color: #ffffff;
    }

    .profile-name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .mini-verified {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1d9bf0;
      flex: 0 0 16px;
    }

    .profile-name {
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    .profile-photo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .profile-photo {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .visitor-meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .status-pill,
    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.95);
      color: #2b2b2b;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22c55e;
      flex: 0 0 12px;
    }

    .pin-icon {
      font-size: 12px;
      line-height: 1;
    }

    .top-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      background: #f21767;
      color: #ffffff;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      padding: 12px 20px;
      text-align: center;
    }

    .more-button {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: #efefef;
      color: #111111;
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 18px;
    }

    .icon-wrap {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 50%;
      background: #000000;
      display: flex;
      align-items: center;
